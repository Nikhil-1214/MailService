<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        .concept-no { color: #7f8c8d; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .section-title { color: #3498db; font-size: 18px; margin-top: 25px; border-bottom: 2px solid #3498db; display: inline-block; }
        pre { background: #282c34; color: #61dafb; padding: 15px; border-radius: 5px; overflow-x: auto; font-family: 'Courier New', Courier, monospace; }
        .example-box { background: #fdf2e9; padding: 15px; border-left: 4px solid #e67e22; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="concept-no" th:text="'Concept #' + ${conceptNo}">Concept #001</div>
    <h1 th:text="${concept}">Concept Name</h1>

    <h2 class="section-title">Theory</h2>
    <p th:text="${theory}">Explanation goes here...</p>

    <h2 class="section-title">Implementation</h2>
    <pre th:text="${code}">// Code snippet</pre>

    <h2 class="section-title">Example</h2>
    <div class="example-box">
        <p th:text="${example}">Example walkthrough...</p>
    </div>

    <p style="margin-top: 30px; font-size: 12px; color: #999;">
        You are receiving this daily DSA insight because you are subscribed to the DS Learner Platform.
    </p>
</div>
</body>
</html>
